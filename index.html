<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RFID信息 - 车管系统</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:"Microsoft YaHei";
}

/* ===== 水印（完全铺满） ===== */
.watermark{
    position:fixed;
    top:-5px;
    left:25px;
    width:100%;
    height:113%;
    display:grid;
    grid-template-rows: repeat(5, 1fr);
    z-index:100;
    pointer-events:none;
}

.row{
    display:grid;
    grid-template-columns: repeat(9, 1fr);
    align-items:flex-start;
    justify-items:center;
}

/* 单个水印 */
.wm-item{
    color:#9ecdbc;
    font-size:18px;
    transform:rotate(-20deg);
    opacity:0.85;
    font-family:"Microsoft YaHei";
    line-height:27px;
}

/* 时间裁切（只轻微裁最后一位） */
.time{
    display:inline-block;
    width:186.5px;   /* 控制裁切程度（关键参数） */
    overflow:hidden;
    white-space:nowrap;
}

/* ===== 内容 ===== */
.container{
    position:absolute;
    top:27px;   /* ← 上移2倍 */
    left:28px;  /* ← 左移2倍 */
    z-index:10;
}

.item{
    line-height:43.5px;
    border-bottom:1px solid #ddd;
}

.label{
    display:inline-block;
    width:85px;
    font-size:14px;
    color:#555;
}

.value{
    font-size:14px;
    font-family:Arial,"Microsoft YaHei";
}

/* 防伪 */
.anti{
    margin-top:8px;
}

img{
    width:600px;
}
</style>
</head>

<body>

<!-- 水印 -->
<div class="watermark" id="wm"></div>

<!-- 信息 -->
<div class="container">

    <div class="item">
        <span class="label">车牌号</span>
        <span class="value">赣AK70935</span>
    </div>

    <div class="item">
        <span class="label">车主姓名</span>
        <span class="value">赵*</span>
    </div>

    <div class="item">
        <span class="label">入网时间</span>
        <span class="value">2025-07-16 13:46:35</span>
    </div>

    <div class="item anti">
        <span class="label">防伪图片</span><br>
        <img src="防伪.png">
    </div>

</div>

<script>

/* ===== 扫码时间 ===== */
function getNow(){
    let d=new Date();
    let p=n=>n.toString().padStart(2,'0');
    return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+
           p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
}

let time=getNow();

/* ===== 水印生成 ===== */
let wm=document.getElementById("wm");

for(let r=0;r<5;r++){
    let row=document.createElement("div");
    row.className="row";

    for(let c=0;c<9;c++){
        let div=document.createElement("div");
        div.className="wm-item";
        div.innerHTML="赣AK70935<br><span class='time'>"+time+"</span>";
        row.appendChild(div);
    }

    wm.appendChild(row);
}

</script>

</body>
</html>
