<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RFID信息 - 车管系统</title>

<style>
body {
    margin: 0;
    background: #f2f2f2;
    font-family: "Microsoft YaHei";
}

.container {
    width: 900px;
    margin: 0 auto;
    background: #fff;
    padding: 20px;
    position: relative;
    min-height: 600px;
}

/* 水印 */
.watermark {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-wrap: wrap;
    transform: rotate(-20deg);
    opacity: 0.25;
    pointer-events: none;
}

.watermark div {
    width: 220px;
    margin: 40px;
    color: #2aa198;
    font-size: 14px;
    line-height: 20px;
}

/* 信息区 */
.info {
    margin-top: 30px;
    line-height: 40px;
}

.label {
    display: inline-block;
    width: 120px;
    color: #555;
}

.value {
    color: #000;
}

canvas {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 水印 -->
    <div class="watermark" id="wm"></div>

    <div class="info">
        <div><span class="label">车牌号</span>赣AK70935</div>
        <div><span class="label">车主姓名</span>赵*</div>
        <div><span class="label">入网时间</span>2025-07-15 13:33:34</div>
    </div>

    <div style="margin-top:20px;">
        <div class="label">防伪图片</div>
        <canvas id="cvs" width="600" height="120"></canvas>
    </div>

</div>

<script>

/* ====== 生成扫码时间（只生成一次） ====== */
function getNow() {
    let d = new Date();
    let pad = n => n.toString().padStart(2, '0');
    return d.getFullYear() + "-" +
        pad(d.getMonth()+1) + "-" +
        pad(d.getDate()) + " " +
        pad(d.getHours()) + ":" +
        pad(d.getMinutes()) + ":" +
        pad(d.getSeconds());
}

const scanTime = getNow();

/* ====== 水印 ====== */
const wm = document.getElementById("wm");

for(let i=0;i<28;i++){
    let div = document.createElement("div");
    div.innerHTML = "赣AK70935<br>" + scanTime;
    wm.appendChild(div);
}

/* ====== 防伪图（高仿版） ====== */
const canvas = document.getElementById("cvs");
const ctx = canvas.getContext("2d");

/* 背景 */
ctx.fillStyle = "#fff";
ctx.fillRect(0,0,600,120);

/* 多层波浪线 */
for(let j=0;j<6;j++){
    ctx.beginPath();
    ctx.strokeStyle = "rgba(0,120,255,0.6)";
    for(let x=0;x<600;x++){
        let y = 60 + Math.sin((x+j*15)*0.04)*20;
        ctx.lineTo(x,y);
    }
    ctx.stroke();
}

/* 圆圈轨迹 */
for(let i=0;i<40;i++){
    ctx.beginPath();
    ctx.strokeStyle = "rgba(0,0,255,0.4)";
    ctx.arc(
        Math.random()*600,
        Math.random()*120,
        8,
        0,
        Math.PI*2
    );
    ctx.stroke();
}

/* 中间红字 */
ctx.font = "bold 36px Arial";
ctx.fillStyle = "rgba(150,0,0,0.9)";
ctx.textAlign = "center";
ctx.fillText("赣AK70935",300,70);

</script>

</body>
</html>
