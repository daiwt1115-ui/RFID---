<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>车辆信息</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }
        .box {
            margin-top: 100px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
        h1 {
            color: #333;
        }
        .plate {
            font-size: 40px;
            color: #007bff;
            margin: 20px 0;
        }
        .time {
            color: gray;
        }
    </style>
</head>

<body>
<div class="box">
    <h1>车辆信息</h1>
    <div class="plate">赣AK70935</div>
    <div class="time" id="time"></div>
</div>

<script>
function updateTime(){
    const now = new Date();
    document.getElementById("time").innerText =
        "当前时间：" + now.toLocaleString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
